<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zvídavě.cz — finální logotyp</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #e8e4dc;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 60px;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    gap: 48px;
    align-items: flex-start;
  }
  .logo {
    padding: 44px 64px;
    display: inline-flex;
    align-items: baseline;
  }
  .main {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-style: italic;
    font-size: 80px;
    line-height: 1;
    letter-spacing: -0.5px;
  }
  .dot {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-style: italic;
    font-size: 80px;
    color: #C9A84C;
    line-height: 1;
    margin-left: 1px;
  }
  .cz {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 80px;
    line-height: 1;
    opacity: 0.32;
    margin-left: -2px;
  }
  .label {
    font-family: sans-serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #999;
    margin-top: 10px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div>
    <div class="logo" style="background: #1B2A4A;">
      <span class="main" style="color: white;">Zvídavě</span>
      <span class="dot">.</span>
      <span class="cz" style="color: white;">cz</span>
    </div>
    <div class="label">Dark — navy</div>
  </div>

  <div>
    <div class="logo" style="background: white;">
      <span class="main" style="color: #5BB8D4;">Zvídavě</span>
      <span class="dot">.</span>
      <span class="cz" style="color: #5BB8D4;">cz</span>
    </div>
    <div class="label">Light — blankytná</div>
  </div>

</div>
</body>
</html>
